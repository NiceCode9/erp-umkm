<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anda Sedang Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, Segoe UI, Roboto, sans-serif;
            background: linear-gradient(135deg, #58CC02 0%, #1CB0F6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            color: #3C3C3C;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #777777;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .status {
            display: inline-block;
            background: #e01e2c;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Anda Sedang Offline</h1>
        <p>Koneksi internet Anda sedang terputus. Aplikasi ini memerlukan koneksi internet yang aktif untuk berfungsi dengan baik.</p>
        <p>Silakan periksa koneksi internet Anda dan coba lagi.</p>
        <div class="status">STATUS: OFFLINE</div>
    </div>
</body>
</html>
